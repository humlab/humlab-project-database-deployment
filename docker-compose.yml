version: '3.8'

services:
  client:
    image: nginx:latest
    ports:
      - "8080:80" # Host port 8080 to container port 80
    volumes:
      #- ./mounts/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mounts/nginx/site.conf:/etc/nginx/conf.d/site.conf:ro
      - ./humlab-project-database-client/public:/usr/share/nginx/html # Mount your React app
    depends_on:
      - server

  server:
    build:
      context: ./docker/server
      dockerfile: Dockerfile
    volumes:
      - ./humlab-project-database-server:/app
    ports:
      - "3100:3100" # Expose Node.js app on port 3000
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017
      PORT: 3100
      DB_NAME: humlab
    depends_on:
      - mongo # Wait for MongoDB to be up

  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    #ports:
    #  - "27017:27017" # Expose MongoDB's default port
    volumes:
      - ./mounts/mongo/data:/data/db # Persist MongoDB data
      - ./mounts/mongo/exports:/mongo-exports # Persist MongoDB exports

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
