services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${PORT_APP:-80}:80"
    volumes:
      - ./mounts/nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server

  client:
    build:
      context: ./client/web
      dockerfile: docker/Dockerfile
      target: dev
    expose:
      - "8081"
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./client/web:/app:Z
      - /app/node_modules
      - ./client/src/assets:/app/public/assets:ro
    depends_on:
      - server

  server:
    build:
      context: ./docker/server
      dockerfile: Dockerfile
    expose:
      - "3100"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017
      PORT: 3100
      DB_NAME: humlab
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    #ports:
    #  - "27017:27017" # Expose MongoDB's default port
    volumes:
      - ./mounts/mongo/data:/data/db
      - ./mounts/mongo/exports:/mongo-exports

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - ${PORT_MONGO_EXPRESS:-8081}:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}

